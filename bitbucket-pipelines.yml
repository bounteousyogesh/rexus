image: atlassian/default-image:5

definitions:
  scripts:
    - &docker_build |
        set -euo pipefail

        export DOCKER_BUILDKIT=0
        export IMAGE_NAME="${BITBUCKET_REPO_SLUG}-${SERVICE}"
        export IMAGE_TAG="${BITBUCKET_TAG:-${BITBUCKET_COMMIT:0:6}}"

        if [ "${SERVICE}" = "backend" ]; then
          BUILD_CONTEXT="."
          DOCKERFILE_PATH="backend/Dockerfile"
        else
          BUILD_CONTEXT="${SERVICE}"
          DOCKERFILE_PATH="${SERVICE}/Dockerfile"
        fi

        echo "Building Docker image ${IMAGE_NAME}:${IMAGE_TAG}"
        docker build \
          -f "${DOCKERFILE_PATH}" \
          -t "${IMAGE_NAME}:${IMAGE_TAG}" \
          "${BUILD_CONTEXT}"

  steps:
    - step: &build_backend_step
        name: Build backend image
        services:
          - docker
        script:
          - export SERVICE="backend"
          - *docker_build

    - step: &build_frontend_step
        name: Build frontend image
        services:
          - docker
        script:
          - export SERVICE="frontend"
          - *docker_build

    - step: &push_backend_step
        name: Push backend image
        oidc: true
        services:
          - docker
        caches:
          - docker
        script:
          - export SERVICE="backend"
          - *docker_build
          - pipe: atlassian/aws-ecr-push-image:2.6.0
            variables:
              AWS_OIDC_ROLE_ARN: "${ECR_PUSH_ROLE_ARN}"
              AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
              IMAGE_NAME: "${IMAGE_NAME}"
              TAGS: "${IMAGE_TAG}"
              DEBUG: "false"
              AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
              AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"

    - step: &push_frontend_step
        name: Push frontend image
        oidc: true
        services:
          - docker
        caches:
          - docker
        script:
          - export SERVICE="frontend"
          - *docker_build
          - pipe: atlassian/aws-ecr-push-image:2.6.0
            variables:
              AWS_OIDC_ROLE_ARN: "${ECR_PUSH_ROLE_ARN}"
              AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION}"
              IMAGE_NAME: "${IMAGE_NAME}"
              TAGS: "${IMAGE_TAG}"
              DEBUG: "false"
              AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
              AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"

pipelines:
  pull-requests:
    '**':
      - step:
          <<: *build_backend_step
          condition:
            changesets:
              includePaths:
                - "backend/**"
                - "data/**"

      - step:
          <<: *build_frontend_step
          condition:
            changesets:
              includePaths:
                - "frontend/**"

  branches:
    main:
      - step:
          <<: *push_backend_step
          condition:
            changesets:
              includePaths:
                - "backend/**"
                - "data/**"

      - step:
          <<: *push_frontend_step
          condition:
            changesets:
              includePaths:
                - "frontend/**"

  custom:
    push-backend-image:
      - step: *push_backend_step

    push-frontend-image:
      - step: *push_frontend_step