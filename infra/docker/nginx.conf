# REX-US nginx configuration
#
# In ECS with ALB path-based routing, the ALB forwards:
#   /api/*   → backend container directly (port 8000 target group)
#   /health* → backend container directly
#   /*       → this frontend container (port 80)
#
# The proxy_pass blocks below provide a fallback for local docker-compose
# where the frontend and backend are co-located via a shared network.
# In ECS production, the "backend" hostname should resolve to the ALB or
# to the backend service via Cloud Map (service discovery).
#
# The BACKEND_URL env var injected by ECS can be picked up by an entrypoint
# script to rewrite the upstream at runtime if needed.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Compression ─────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── API proxy → backend FastAPI ─────────────────────────────────────────
    # In ECS, ALB routes /api/* to the backend target group directly.
    # This proxy block is active for local docker-compose only.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Health check proxy → backend ────────────────────────────────────────
    location /health {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 10s;
        access_log off;
    }

    # ── Static assets: aggressive caching ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA catch-all: serve index.html for all unmatched routes ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
